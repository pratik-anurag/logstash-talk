input { stdin { } }
filter {
  grok { match => { "message" => "%{TIMESTAMP_ISO8601:log_ts} %{DATA:service} %{LOGLEVEL:level} user=%{DATA:user} action=%{DATA:action} status=%{NUMBER:status:int} latency_ms=%{NUMBER:latency_ms:int}" } }
  if "_grokparsefailure" in [tags] {
    mutate { add_field => { "parse_status" => "failed" } }
  } else {
    mutate { add_field => { "parse_status" => "ok" } }
  }
}
output { stdout { codec => rubydebug } }
