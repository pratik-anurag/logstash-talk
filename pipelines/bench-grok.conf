input {
  file {
    path => "${PWD}/samples/100k.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/completed-grok.log"
  }
}
filter {
  grok { match => { "message" => "%{TIMESTAMP_ISO8601:log_ts} %{DATA:service} %{LOGLEVEL:level} user=%{DATA:user} action=%{DATA:action} status=%{NUMBER:status:int} latency_ms=%{NUMBER:latency_ms:int}" } }
}
output { file { path => "${PWD}/results/grok.out" codec => "line" } }
